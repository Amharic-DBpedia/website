# Week 2 DEF config for Amharic DBpedia verification runs.
#
# The runner copies this file into each run directory and overrides:
# - base-dir
# - log-dir
# - source
#
# The extractor set mirrors the local Amharic DEF config in ../extraction-framework/dump.

base-dir=./data/def-runs
log-dir=./data/def-runs/logs
source=pages-articles.xml.bz2
require-download-complete=false
languages=am

extractors=.ArticleCategoriesExtractor,.ArticlePageExtractor,.ArticleTemplatesExtractor,.CategoryLabelExtractor,.ExternalLinksExtractor,.GeoExtractor,.InfoboxExtractor,.InterLanguageLinksExtractor,.LabelExtractor,.PageIdExtractor,.PageLinksExtractor,.RedirectExtractor,.RevisionIdExtractor,.ProvenanceExtractor,.SkosCategoriesExtractor,.WikiPageLengthExtractor,.WikiPageOutDegreeExtractor
extractors.am=.MappingExtractor,.DisambiguationExtractor,.HomepageExtractor,.TopicalConceptsExtractor,.ImageExtractorNew,.CommonsResourceExtractor,.RedirectExtractor,.ArticleTemplatesExtractor,.LabelExtractor,.TemplateParameterExtractor,.InfoboxExtractor

copyrightCheck=false
